name: Deploy Dataflow

on:
  workflow_dispatch:
    inputs:
      pipeline_name:
        required: true
        type: string
      version:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: dataflow-templates-repository

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Install yq + jq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          sudo apt-get update && sudo apt-get install -y jq

      - name: Update version in values.yaml
        run: |
          FILE="deployments/dataflow/${{ inputs.pipeline_name }}/values.yaml"
          yq -i '.image.tag = "${{ inputs.version }}"' "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "deploy(dataflow): ${{ inputs.pipeline_name }} -> ${{ inputs.version }}" || exit 0
          git push

      - name: Read config
        id: cfg
        run: |
          FILE="deployments/dataflow/${{ inputs.pipeline_name }}/values.yaml"

          echo "project_id=$(yq -r '.gcp.project_id' $FILE)" >> $GITHUB_OUTPUT
          echo "region=$(yq -r '.gcp.region' $FILE)" >> $GITHUB_OUTPUT
          echo "image_name=$(yq -r '.artifact_registry.image_name' $FILE)" >> $GITHUB_OUTPUT
          echo "template_gcs=$(yq -r '.template.gcs_path' $FILE)" >> $GITHUB_OUTPUT
          echo "metadata=$(yq -r '.template.metadata_file' $FILE)" >> $GITHUB_OUTPUT
          echo "tag=$(yq -r '.image.tag' $FILE)" >> $GITHUB_OUTPUT

      - name: Resolve dataflow git ref from version
        id: ref
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.cfg.outputs.tag }}"
          IMAGE_NAME="${{ steps.cfg.outputs.image_name }}"

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            DATAFLOW_REF="v${VERSION}"
            echo "Detected release version: $VERSION -> git ref $DATAFLOW_REF"
          elif [[ "$VERSION" =~ ^${IMAGE_NAME}-([0-9a-f]{40})$ ]]; then
            DATAFLOW_REF="${BASH_REMATCH[1]}"
            echo "Detected preview version: $VERSION -> commit sha $DATAFLOW_REF"
          else
            echo "Unsupported version format: $VERSION"
            echo "Expected either:"
            echo "  - release: 1.X.X"
            echo "  - preview: ${IMAGE_NAME}-<40-char-commit-sha>"
            exit 1
          fi

          echo "dataflow_ref=$DATAFLOW_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout dataflow repo
        uses: actions/checkout@v4
        with:
          repository: ahmedboudia-dgc/dataplatform-dataflow
          path: dataflow
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ steps.ref.outputs.dataflow_ref }}

      - name: Build flex template
        run: |
          gcloud dataflow flex-template build "${{ steps.cfg.outputs.template_gcs }}" \
            --image "${{ env.REGISTRY }}/${{ steps.cfg.outputs.project_id }}/${{ env.REPOSITORY }}/${{ steps.cfg.outputs.image_name }}:${{ steps.cfg.outputs.tag }}" \
            --sdk-language PYTHON \
            --metadata-file "dataflow/${{ steps.cfg.outputs.image_name }}/${{ steps.cfg.outputs.metadata }}" \
            --project "${{ steps.cfg.outputs.project_id }}"
